appId: io.spire.app
productName: Spire
publish:
  provider: github
  owner: TitaniumKnight1
  repo: Spire
  releaseType: release
directories:
  output: dist
  buildResources: assets
files:
  - dist/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: binaries/
    to: binaries/
    filter:
      - "*.exe"
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
linux:
  target:
    - target: AppImage
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerSidebar: null
  include: build/installer.nsh
