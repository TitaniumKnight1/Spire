name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version and tag
        id: versioning
        shell: pwsh
        run: |
          $latestTag = gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          if ($LASTEXITCODE -ne 0) { $latestTag = "" }
          if (-not $latestTag -or $latestTag -eq "null") { $latestTag = "v0.0.0" }
          $latestTag = $latestTag.Trim()

          if (-not ($latestTag -match '^v(\d+)\.(\d+)\.(\d+)$')) {
            Write-Host "Latest tag did not match vX.Y.Z; defaulting to v0.0.0"
            $latestTag = "v0.0.0"
          }
          $null = $latestTag -match '^v(\d+)\.(\d+)\.(\d+)$'
          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]

          if ($latestTag -eq "v0.0.0") {
            $commits = @(git log --pretty=format:"%s" --no-merges)
          } else {
            $commits = @(git log "$latestTag..HEAD" --pretty=format:"%s" --no-merges)
          }

          if ($commits.Count -eq 0) {
            Write-Host "No new commits since last release. Skipping."
            echo "SKIP=true" >> $env:GITHUB_ENV
            exit 0
          }

          echo "PREVIOUS_TAG=$latestTag" >> $env:GITHUB_ENV

          $logRange = if ($latestTag -eq "v0.0.0") { "" } else { "$latestTag..HEAD" }
          $bump = "patch"
          if ($logRange) {
            $hasBreaking = git log $logRange --grep="BREAKING CHANGE" --fixed-strings --pretty=format:%h --no-merges 2>$null
          } else {
            $hasBreaking = git log --grep="BREAKING CHANGE" --fixed-strings --pretty=format:%h --no-merges 2>$null
          }
          if (-not [string]::IsNullOrWhiteSpace($hasBreaking)) { $bump = "major" }

          if ($bump -ne "major") {
            foreach ($c in $commits) {
              if ($c -match "^feat!:") { $bump = "major"; break }
            }
          }
          if ($bump -ne "major") {
            foreach ($c in $commits) {
              if ($c -match "^feat(\(.+\))!:") { $bump = "major"; break }
            }
          }
          if ($bump -ne "major") {
            foreach ($c in $commits) {
              if ($c -match "^feat(\(.+\))?:") { $bump = "minor"; break }
            }
          }

          switch ($bump) {
            "major" { $major++; $minor = 0; $patch = 0 }
            "minor" { $minor++; $patch = 0 }
            default { $patch++ }
          }

          $newVersion = "v$major.$minor.$patch"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $newVersion
          git push origin $newVersion

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Download yt-dlp
        if: env.SKIP != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path binaries
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "binaries/yt-dlp.exe"
        shell: pwsh

      - name: Download aria2c
        if: env.SKIP != 'true'
        run: |
          $aria2Version = "1.37.0"
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-$aria2Version/aria2-$aria2Version-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "aria2.zip"
          Expand-Archive -Path "aria2.zip" -DestinationPath "aria2-extracted"
          $exe = Get-ChildItem -Recurse "aria2-extracted" -Filter "aria2c.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "binaries/aria2c.exe"
        shell: pwsh

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: npm ci

      - name: Build
        if: env.SKIP != 'true'
        run: npm run build

      - name: Generate release notes
        id: release_notes
        if: env.SKIP != 'true'
        shell: pwsh
        run: |
          $prevTag = $env:PREVIOUS_TAG
          if (-not $prevTag) { $prevTag = "v0.0.0" }

          if ($prevTag -eq "v0.0.0") {
            $commits = @(git log --pretty=format:"%s" --no-merges)
          } else {
            $commits = @(git log "$prevTag..HEAD" --pretty=format:"%s" --no-merges)
          }

          $features = @()
          $fixes = @()
          $other = @()

          foreach ($commit in $commits) {
            if ($commit -match "^feat(\(.+\))?!?:") { $features += "- $commit" }
            elseif ($commit -match "^fix(\(.+\))?!?:") { $fixes += "- $commit" }
            elseif ($commit -notmatch "^(chore|docs|ci|style|refactor|test):") { $other += "- $commit" }
          }

          $notes = ""
          if ($features) { $notes += "## What's New`n" + ($features -join "`n") + "`n`n" }
          if ($fixes) { $notes += "## Bug Fixes`n" + ($fixes -join "`n") + "`n`n" }
          if ($other) { $notes += "## Other Changes`n" + ($other -join "`n") + "`n`n" }
          if (-not $notes) { $notes = "Maintenance release." }

          $notes += "`n---`n> ⚠️ Windows may show a SmartScreen warning on first run — this is expected for unsigned open-source apps. Click 'More info' → 'Run anyway'."

          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Create release
        if: env.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: "Spire ${{ steps.versioning.outputs.version }}"
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(steps.versioning.outputs.version, '-beta') || contains(steps.versioning.outputs.version, '-alpha') }}
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
